</head>
<body data-theme="dark" data-accent="mono" data-density="regular" data-lion="featured" data-hero-bg="photo">
<div id="app">
  <noscript>
    <div style="padding:60px 24px;text-align:center;font-family:system-ui;color:#f5f5f5;background:#0a0a0a;min-height:100vh">
      <h1 style="font-size:32px;margin:0 0 16px">ES Logistics — Spedycja międzynarodowa</h1>
      <p style="max-width:560px;margin:0 auto 24px;color:#a8a8a8">Strona wymaga włączenia JavaScript. Skontaktuj się z nami: biuro@eslogistics.pl · ul. Kopanina 28/32, Poznań</p>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="forms.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "mono",
  "lion": "featured",
  "density": "regular",
  "heroBg": "photo",
  "heroVariant": "A"
}/*EDITMODE-END*/;

function App() {
  const [route] = useHashRoute();
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.body.dataset.theme = t.theme;
    document.body.dataset.accent = t.accent;
    document.body.dataset.lion = t.lion;
    document.body.dataset.density = t.density;
    document.body.dataset.heroBg = t.heroBg;
  }, [t]);

  let page;
  switch (route) {
    case '/o-nas': page = <AboutPage/>; break;
    case '/uslugi': page = <ServicesPage/>; break;
    case '/dla-klienta': page = <ClientPage/>; break;
    case '/dla-przewoznika': page = <CarrierPage/>; break;
    case '/kontakt': page = <ContactPage/>; break;
    case '/legal': page = <LegalPage/>; break;
    default: page = <HomePage heroVariant={t.heroVariant}/>;
  }

  return (
    <>
      <Header route={route}/>
      {page}
      <Footer/>

      <TweaksPanel>
        <TweakSection label="Motyw" />
        <TweakRadio label="Tryb" value={t.theme} options={[{value:'dark',label:'Dark'},{value:'light',label:'Light'}]} onChange={(v) => setTweak('theme', v)}/>
        <TweakRadio label="Akcent" value={t.accent}
          options={[{value:'mono',label:'Mono'},{value:'blue',label:'Blue'},{value:'emerald',label:'Emerald'},{value:'amber',label:'Amber'}]}
          onChange={(v) => setTweak('accent', v)}/>

        <TweakSection label="Lew (godło)" />
        <TweakRadio label="Eksponowanie" value={t.lion}
          options={[{value:'subtle',label:'Subtle'},{value:'featured',label:'Featured'},{value:'editorial',label:'Editorial'}]}
          onChange={(v) => setTweak('lion', v)}/>

        <TweakSection label="Hero" />
        <TweakRadio label="Wariant nagłówka" value={t.heroVariant}
          options={[{value:'A',label:'A'},{value:'B',label:'B'},{value:'C',label:'C'}]}
          onChange={(v) => setTweak('heroVariant', v)}/>
        <TweakRadio label="Tło hero" value={t.heroBg}
          options={[{value:'photo',label:'Foto'},{value:'split',label:'Split'},{value:'type',label:'Typo'}]}
          onChange={(v) => setTweak('heroBg', v)}/>

        <TweakSection label="Layout" />
        <TweakRadio label="Gęstość sekcji" value={t.density}
          options={[{value:'airy',label:'Airy'},{value:'regular',label:'Regular'},{value:'dense',label:'Dense'}]}
          onChange={(v) => setTweak('density', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
