<body data-theme="dark" data-accent="mono" data-density="regular" data-lion="featured" data-hero-bg="photo">
<div id="app">
  <div id="boot-loader" style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;z-index:9999;font-family:'Barlow','Inter',system-ui,sans-serif">
    <img src="assets/lew.png" alt="" style="width:96px;height:96px;object-fit:contain;animation:bootpulse 1.6s ease-in-out infinite"/>
    <div style="font-style:italic;font-weight:700;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:#888">ES Logistics</div>
    <div style="width:120px;height:2px;background:#222;overflow:hidden;border-radius:1px"><div style="width:40%;height:100%;background:#f5f5f5;animation:bootbar 1.2s ease-in-out infinite"></div></div>
  </div>
  <style>
    @keyframes bootpulse { 0%,100%{opacity:.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} }
    @keyframes bootbar { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }
  </style>
  <noscript>
    <div style="padding:60px 24px;text-align:center;font-family:system-ui;color:#f5f5f5;background:#0a0a0a;min-height:100vh">
      <h1 style="font-size:32px;margin:0 0 16px">ES Logistics — Transport i spedycja międzynarodowa</h1>
      <p style="max-width:560px;margin:0 auto 24px;color:#a8a8a8">Strona wymaga włączenia JavaScript. Skontaktuj się z nami: office@eslogistics.pl · +48 539 849 869 · ul. Święty Marcin 29/8, Poznań</p>
    </div>
  </noscript>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="forms.jsx"></script>
<script type="text/babel" src="enhancements.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "mono",
  "lion": "featured",
  "density": "regular",
  "heroBg": "photo",
  "heroVariant": "A"
}/*EDITMODE-END*/;

function App() {
  const [route] = useHashRoute();
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.body.dataset.theme = t.theme;
    document.body.dataset.accent = t.accent;
    document.body.dataset.lion = t.lion;
    document.body.dataset.density = t.density;
    document.body.dataset.heroBg = t.heroBg;
  }, [t]);

  let page;
  switch (route) {
    case '/':
    case '': page = <HomePage heroVariant={t.heroVariant}/>; break;
    case '/o-nas': page = <AboutPage/>; break;
    case '/dla-klienta': page = <ClientPage/>; break;
    case '/kontakt': page = <ContactPage/>; break;
    case '/legal': page = <LegalPage/>; break;
    default: page = <NotFoundPage/>;
  }

  return (
    <>
      <SkipLink/>
      <Header route={route}/>
      <div id="main-content" className="page-fade" key={route}>{page}</div>
      <Footer/>
      <CookieBanner/>
      <BackToTop/>
      <MobileCTA/>

      <TweaksPanel>
        <TweakSection label="Motyw" />
        <TweakRadio label="Tryb" value={t.theme} options={[{value:'dark',label:'Dark'},{value:'light',label:'Light'}]} onChange={(v) => setTweak('theme', v)}/>
        <TweakRadio label="Akcent" value={t.accent}
          options={[{value:'mono',label:'Mono'},{value:'blue',label:'Blue'},{value:'emerald',label:'Emerald'},{value:'amber',label:'Amber'}]}
          onChange={(v) => setTweak('accent', v)}/>

        <TweakSection label="Lew (godło)" />
        <TweakRadio label="Eksponowanie" value={t.lion}
          options={[{value:'subtle',label:'Subtle'},{value:'featured',label:'Featured'},{value:'editorial',label:'Editorial'}]}
          onChange={(v) => setTweak('lion', v)}/>

        <TweakSection label="Hero" />
        <TweakRadio label="Wariant nagłówka" value={t.heroVariant}
          options={[{value:'A',label:'A'},{value:'B',label:'B'},{value:'C',label:'C'}]}
          onChange={(v) => setTweak('heroVariant', v)}/>
        <TweakRadio label="Tło hero" value={t.heroBg}
          options={[{value:'photo',label:'Foto'},{value:'split',label:'Split'},{value:'type',label:'Typo'}]}
          onChange={(v) => setTweak('heroBg', v)}/>

        <TweakSection label="Layout" />
        <TweakRadio label="Gęstość sekcji" value={t.density}
          options={[{value:'airy',label:'Airy'},{value:'regular',label:'Regular'},{value:'dense',label:'Dense'}]}
          onChange={(v) => setTweak('density', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
setTimeout(() => {
  const boot = document.getElementById('boot-loader');
  if (boot) {
    boot.style.transition = 'opacity .4s ease';
    boot.style.opacity = '0';
    setTimeout(() => boot.remove(), 400);
  }
}, 600);
</script>
</body>
</html>
